# golangci-lint v2 — ultra strict
version: "2"

run:
  timeout: 30m
  tests: true
  go: "1.25"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
    - gosec
    - gocyclo
    - gocognit
    - cyclop
    - funlen
    - nestif
    - lll
    - dupl
    - goconst
    - thelper
    - gocritic
    - misspell
    - durationcheck
    - nilerr
    - errorlint
    - prealloc
    - forbidigo
    - gomoddirectives

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    gosec:
      severity: low
      confidence: low
      excludes:
        - G115
        - G602
    govet:
      enable-all: true
      disable:
        - fieldalignment
    staticcheck:
      checks: ["all"]
    revive:
      severity: warning
      rules:
        - name: exported
          severity: warning
        - name: var-naming
          severity: warning
        - name: package-comments
          severity: warning
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: if-return
        - name: increment-decrement
        - name: range
        - name: receiver-naming
        - name: indent-error-flow
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
        - name: unreachable-code
        - name: redefines-builtin-id
        - name: bool-literal-in-expr
        - name: constant-logical-expr
    gocyclo:
      min-complexity: 15
    gocognit:
      min-complexity: 40
    cyclop:
      max-complexity: 16
    funlen:
      lines: 80
      statements: 50
    goconst:
      min-len: 2
      min-occurrences: 4
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
    lll:
      line-length: 140
    misspell:
      locale: US
    prealloc:
      simple: true
      range-loops: true
      for-loops: true
    dupl:
      threshold: 150

  exclusions:
    presets:
      - common-false-positives
    rules:
      - path: '_test\.go'
        linters:
          - gosec
          - dupl
          - funlen
          - gocognit
          - gocyclo
          - cyclop
          - lll
          - errcheck
          - goconst
          - prealloc
          - gocritic
          - revive
